schema: '2.0'
stages:
  download_tsg:
    cmd: "mkdir -p in/geotiffs\necho \"Downloading from https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-...\"\
      \ncurl -L -o in/geotiffs/nesp36_seagrass_baseline.tif \"https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-\"\
      \n"
    outs:
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
  raster_to_zarr_tsg:
    cmd: csdr datasets raster-to-zarr --input-raster in/resampled-geotiffs/nesp36_seagrass_baseline.tif
      --output-zarr out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: da41e3e30a46292404913b08080c5cd9
      size: 6566
    - path: in/resampled-geotiffs
      hash: md5
      md5: 4046da95defe9c5bd09233864ece8cec.dir
      size: 9018730
      nfiles: 1
    outs:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 2c032a08911fdbd6cad820450fc6b58c.dir
      size: 81802
      nfiles: 20
  validate_tsg:
    cmd: csdr datasets validate-zarr --input-zarr out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: da41e3e30a46292404913b08080c5cd9
      size: 6566
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 2c032a08911fdbd6cad820450fc6b58c.dir
      size: 81802
      nfiles: 20
  upload_tsg:
    cmd: if [[ s3://csdr-dvc-out/nesp36_seagrass_baseline.zarr == s3://* ]]; then
      aws s3 cp out/nesp36_seagrass_baseline.zarr s3://csdr-dvc-out/nesp36_seagrass_baseline.zarr
      --recursive; else echo "out_s3_path does not start with s3://, skipping upload"
      && cp -r out/nesp36_seagrass_baseline.zarr s3://csdr-dvc-out/nesp36_seagrass_baseline.zarr;
      fi
    deps:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 2c032a08911fdbd6cad820450fc6b58c.dir
      size: 81802
      nfiles: 20
    outs:
    - path: s3://csdr-dvc-out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: abb594c798da71a78339431e6097cdd6.dir
      size: 81802
      nfiles: 20
  warp_tsg:
    cmd: csdr datasets warp-raster --input-dir "in/geotiffs" --output-dir "in/resampled-geotiffs"
      --target-crs "epsg:4326" --target-resolution "0.0004" --resampling-method "nearest"
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: da41e3e30a46292404913b08080c5cd9
      size: 6566
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
    outs:
    - path: in/resampled-geotiffs
      hash: md5
      md5: 4046da95defe9c5bd09233864ece8cec.dir
      size: 9018730
      nfiles: 1
