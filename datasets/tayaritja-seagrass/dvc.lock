schema: '2.0'
stages:
  download_tsg:
    cmd: "mkdir -p in/geotiffs\necho \"Downloading from https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-...\"\
      \ncurl -L -o in/geotiffs/nesp36_seagrass_baseline.tif \"https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-\"\
      \n"
    outs:
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
  warp_tsg:
    cmd: csdr datasets warp-raster --input-dir "in/geotiffs" --output-dir 
      "in/resampled-geotiffs" --target-crs "epsg:4326" --target-resolution 
      "0.0004" --resampling-method "nearest"
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: da41e3e30a46292404913b08080c5cd9
      size: 6566
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
    outs:
    - path: in/resampled-geotiffs
      hash: md5
      md5: d751713988987e9331980363e24189ce.dir
      size: 0
      nfiles: 0
  raster_to_zarr_tsg:
    cmd: csdr datasets raster-to-zarr --input-raster 
      in/geotiffs/nesp36_seagrass_baseline.tif --output-zarr 
      out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: a2c3b22ddfba9cd7a06885d846acd9a7
      size: 6564
    - path: in/geotiffs/nesp36_seagrass_baseline.tif
      hash: md5
      md5: 1a652c94f19bfda30caeac8254d75b77
      size: 1546732
    outs:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 8c344fe60016626633f47f8881c7b7d1.dir
      size: 705037
      nfiles: 52
  upload_tsg:
    cmd: if [[ 
      s3://csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr == 
      s3://* ]]; then aws s3 cp out/nesp36_seagrass_baseline.zarr 
      s3://csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr 
      --recursive; else echo "out_s3_path does not start with s3://, skipping 
      upload" && cp -r out/nesp36_seagrass_baseline.zarr 
      s3://csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr; fi
    deps:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 8c344fe60016626633f47f8881c7b7d1.dir
      size: 705037
      nfiles: 52
    outs:
    - path: s3://csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 7c77c5ad497a6a1e348fb2b37f304c23.dir
      size: 705037
      nfiles: 52
  validate_tsg:
    cmd: csdr datasets validate-zarr --input-zarr 
      out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: a2c3b22ddfba9cd7a06885d846acd9a7
      size: 6564
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 8c344fe60016626633f47f8881c7b7d1.dir
      size: 705037
      nfiles: 52
