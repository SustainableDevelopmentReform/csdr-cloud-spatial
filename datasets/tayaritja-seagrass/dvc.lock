schema: '2.0'
stages:
  download_tsg:
    cmd: "mkdir -p in/geotiffs\necho \"Downloading from https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-...\"\
      \ncurl -L -o in/geotiffs/nesp36_seagrass_baseline.tif \"https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-\"\
      \n"
    outs:
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
  raster_to_zarr_tsg:
    cmd: csdr datasets raster-to-zarr --input-raster in/geotiffs/nesp36_seagrass_baseline.tif
      --output-zarr out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: aa51d8a81fc477c726b0a9969eb0e1a0
      size: 6477
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
    outs:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 14800c30a062a4ea9b650797f2b6bebd.dir
      size: 705037
      nfiles: 52
  validate_tsg:
    cmd: csdr datasets validate-zarr --input-zarr out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: aa51d8a81fc477c726b0a9969eb0e1a0
      size: 6477
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 14800c30a062a4ea9b650797f2b6bebd.dir
      size: 705037
      nfiles: 52
  upload_tsg:
    cmd: if [[ /tmp/csdr/csdr-dvc-out/nesp36_seagrass_baseline.zarr == s3://* ]];
      then aws s3 cp out/nesp36_seagrass_baseline.zarr /tmp/csdr/csdr-dvc-out/nesp36_seagrass_baseline.zarr
      --recursive; else echo "out_s3_path does not start with s3://, skipping upload"
      && cp -r out/nesp36_seagrass_baseline.zarr /tmp/csdr/csdr-dvc-out/nesp36_seagrass_baseline.zarr;
      fi
    deps:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 14800c30a062a4ea9b650797f2b6bebd.dir
      size: 705037
      nfiles: 52
    outs:
    - path: /tmp/csdr/csdr-dvc-out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 14800c30a062a4ea9b650797f2b6bebd.dir
      size: 705037
      nfiles: 52
