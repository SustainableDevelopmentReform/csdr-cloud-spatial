schema: '2.0'
stages:
  download_tsg:
    cmd: "mkdir -p in/geotiffs\necho \"Downloading from https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-...\"\
      \ncurl -L -o in/geotiffs/nesp36_seagrass_baseline.tif \"https://drive.google.com/uc?export=download&id=15F4qz9fHgcBN4b7UdjPTigfIfeYDggx-\"\
      \n"
    outs:
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
  raster_to_zarr_tsg:
    cmd: csdr datasets raster-to-zarr --input-raster in/resampled-geotiffs/nesp36_seagrass_baseline.tif
      --output-zarr out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: da41e3e30a46292404913b08080c5cd9
      size: 6566
    - path: in/resampled-geotiffs
      hash: md5
      md5: 9388fb838b2205b932504612fe124d6b.dir
      size: 9018731
      nfiles: 1
    outs:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 896d8117fe5782c098593599a3f99e78.dir
      size: 81802
      nfiles: 20
  validate_tsg:
    cmd: csdr datasets validate-zarr --input-zarr out/nesp36_seagrass_baseline.zarr
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: da41e3e30a46292404913b08080c5cd9
      size: 6566
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 77a37dd1792d201e3d007d85d3148a64.dir
      size: 81802
      nfiles: 20
  upload_tsg:
    cmd: if [[ /tmp/csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr == s3://* ]]; then
      aws s3 cp out/nesp36_seagrass_baseline.zarr /tmp/csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr
      --recursive; else echo "out_s3_path does not start with s3://, skipping upload"
      && cp -r out/nesp36_seagrass_baseline.zarr /tmp/csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr;
      fi
    deps:
    - path: out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 896d8117fe5782c098593599a3f99e78.dir
      size: 81802
      nfiles: 20
    outs:
    - path: /tmp/csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 896d8117fe5782c098593599a3f99e78.dir
      size: 81802
      nfiles: 20
  warp_tsg:
    cmd: csdr datasets warp-raster --input-dir "in/geotiffs" --output-dir "in/resampled-geotiffs"
      --target-crs "+proj=longlat +datum=WGS84 +no_defs" --target-resolution "0.0004"
      --resampling-method "nearest"
    deps:
    - path: ../../csdr/cli_datasets.py
      hash: md5
      md5: da41e3e30a46292404913b08080c5cd9
      size: 6566
    - path: in/geotiffs
      hash: md5
      md5: fdaed1f09be2fe4e09276a33587365b1.dir
      size: 1546732
      nfiles: 1
    outs:
    - path: in/resampled-geotiffs
      hash: md5
      md5: 9388fb838b2205b932504612fe124d6b.dir
      size: 9018731
      nfiles: 1
