vars:
  - asgs_abs_geoparquet_path: s3://csdr-dvc-out/asgs-ste-2021.parquet
  - gmw_zarr_path: s3://csdr-dvc-out/gmw-v4019-1km-mollweide.zarr
  - gmw_data_variable: data_variable # Variable name within the Zarr
  - zonal_stat: mean # Statistic to calculate
  - geometry_name_dim: asgs_ste # Dimension name for geometries in output
  - fill_value: 0 # Value to fill nodata/NaN with before stats
  - zonal_stats_output: out/gmw_zonal_stats_ste.parquet # Output path for this product

stages:
  calculate_zonal_stats:
    desc: Calculate zonal statistics (mean mangrove proportion) per ASGS State/Territory
    cmd: >-
      csdr vector-cube zonal-stats
      --input-zarr ${gmw_zarr_path}
      --input-geoparquet ${asgs_abs_geoparquet_path}
      --output-path ${zonal_stats_output}
      --data-variable ${gmw_data_variable}
      --stat ${zonal_stat}
      --name-dim ${geometry_name_dim}
      --fill-value ${fill_value}
    deps:
      - ${gmw_zarr_path}
      - ${asgs_abs_geoparquet_path}
      - ../../csdr/cli.py
      - ../../csdr/cli_vector_cube.py # Depends on the new script
    outs:
      - ${zonal_stats_output}:
          cache: false # Output of this specific product calculation

  validate_zonal_stats:
    desc: Validate the generated zonal statistics GeoParquet file
    cmd: >-
      csdr geometries validate
      --input-file ${zonal_stats_output}
      # Add --schema if a specific schema exists for validation
    deps:
      - ${zonal_stats_output} # Depends on the output file
      - ../../csdr/cli.py
      - ../../csdr/cli_geometries.py # Assuming geometry validation is sufficient for now
