# Internal variables
vars:
  - ace_data_variable: data_variable # Variable name within the Zarr
  - geometry_name_dim: acsc # Dimension name for geometries in output
  - fill_value: 0 # Value to fill nodata/NaN with before stats
  - zonal_stats_output: out/ace_zonal_stats_acsc.parquet # Output path for this product

stages:
  calculate_zonal_stats:
    desc: Calculate zonal statistics per Australian Coastal Primary Sediment Compartment
    params:
      - classes
      - zonal_stats
    cmd: >-
      csdr vector-cube zonal-stats
      --input-zarr ${ace_zarr_path}
      --input-geoparquet ${acsc_geoparquet_path}
      --output-path ${zonal_stats_output}
      --data-variable ${ace_data_variable}
      --name-dim ${geometry_name_dim}
      --fill-value ${fill_value}
    deps:
      - ${ace_zarr_path}
      - ${acsc_geoparquet_path}
      - ../../csdr/cli_vector_cube.py
    outs:
      - ${zonal_stats_output}:
          cache: false

  validate_zonal_stats:
    desc: Validate the generated zonal statistics GeoParquet file
    cmd: >-
      csdr geometries validate
      --input-file ${zonal_stats_output}
      # Add --schema if a specific schema exists for validation
    deps:
      - ${zonal_stats_output}
      - ../../csdr/cli_geometries.py

  upload:
    cmd: >-
      if [[ ${out_s3_path} == s3://* ]]; then aws s3 cp ${zonal_stats_output} ${out_s3_path}; else echo "out_s3_path does not start with s3://, skipping upload" && cp ${zonal_stats_output} ${out_s3_path}; fi
    deps:
      - ${zonal_stats_output}
    outs:
      - ${out_s3_path}:
          cache: false
