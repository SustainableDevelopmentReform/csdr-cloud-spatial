    - path:
        s3://csdr-dev-env-data-ap-southeast-2/ga_s2ls_coastalecosystems_cyear_3_2021--P1Y_interim_classification_0-0-2.zarr
      hash: md5
      md5: 89ed8242e4039e9eff71a34539ee0de4.dir
      size: 74244
      nfiles: 41
    params:
      params.yaml:
        classes:
        - 2
        - 3
        - 4
        - 5
        zonal_stats:
        - stat: sum
          mode: area
          name: total_area
        - stat: mean
          mode: pixel
          name: percent_cover
    outs:
    - path: out/ace_zonal_stats_acsc.parquet
