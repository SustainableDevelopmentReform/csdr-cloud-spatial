      md5: f907107a4a45a83f1d57e86c621fd6ac
      size: 22583681
  upload:
    cmd: if [[
      s3://csdr-dev-env-data-ap-southeast-2/ace_zonal_stats_acsc.parquet ==
      s3://* ]]; then aws s3 cp out/ace_zonal_stats_acsc.parquet
      s3://csdr-dev-env-data-ap-southeast-2/ace_zonal_stats_acsc.parquet; else
      echo "out_s3_path does not start with s3://, skipping upload" && cp
