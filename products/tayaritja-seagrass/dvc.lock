schema: '2.0'
stages:
  calculate_zonal_stats:
    cmd: csdr vector-cube zonal-stats --input-zarr s3://csdr-dvc-out/nesp36_seagrass_baseline.zarr
      --input-geoparquet s3://csdr-dvc-out/acsc-ga-2015.parquet --output-path out/tsg_zonal_stats_acsc.parquet
      --data-variable data_variable --name-dim acsc --fill-value None --proj-crs epsg:9473
    deps:
    - path: ../../csdr/cli_vector_cube.py
      hash: md5
      md5: 4c0b1efbb9dbd21ff371f64ffda1bbc3
      size: 9432
    - path: s3://csdr-dvc-out/acsc-ga-2015.parquet
      hash: md5
      etag: 690cc905d526d6f14d1ac3f2fcb3662c-2
      size: 8959806
    - path: s3://csdr-dvc-out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: e9e5654fbd4ed65dbbb9777603f5fb92.dir
      size: 81802
      nfiles: 20
    params:
      params.yaml:
        zonal_stats:
        - stat: sum
          mode: area
          name: total_area
        - stat: mean
          mode: pixel
          name: percent_cover
    outs:
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: 378b90f9ce337f124e5a1e2ac540156d
      size: 22578192
  validate_zonal_stats:
    cmd: 'csdr geometries validate --input-file out/tsg_zonal_stats_acsc.parquet #
      Add --schema if a specific schema exists for validation'
    deps:
    - path: ../../csdr/cli_geometries.py
      hash: md5
      md5: e046408ff0900f26dac7cf33018d318b
      size: 4856
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: 378b90f9ce337f124e5a1e2ac540156d
      size: 22578192
  upload:
    cmd: if [[ s3://csdr-dvc-out/tsg_zonal_stats_acsc.parquet == s3://* ]]; then aws
      s3 cp out/tsg_zonal_stats_acsc.parquet s3://csdr-dvc-out/tsg_zonal_stats_acsc.parquet;
      else echo "out_s3_path does not start with s3://, skipping upload" && cp out/tsg_zonal_stats_acsc.parquet
      s3://csdr-dvc-out/tsg_zonal_stats_acsc.parquet; fi
    deps:
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: 378b90f9ce337f124e5a1e2ac540156d
      size: 22578192
    outs:
    - path: s3://csdr-dvc-out/tsg_zonal_stats_acsc.parquet
      hash: md5
      etag: 57c9e4508f1ff2f1562a6c2780c8c736-3
      size: 22578192
