schema: '2.0'
stages:
  calculate_zonal_stats:
    cmd: csdr vector-cube zonal-stats --input-zarr 
      s3://csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr 
      --input-geoparquet 
      s3://csdr-dev-env-data-ap-southeast-2/acsc-ga-2015.parquet --output-path 
      out/tsg_zonal_stats_acsc.parquet --data-variable data_variable --name-dim 
      acsc --fill-value None --proj-crs epsg:9473
    deps:
    - path: ../../csdr/cli_vector_cube.py
      hash: md5
      md5: 8b0a7de4a5155cbad3e7c3ffe167ceb8
      size: 9784
    - path: s3://csdr-dev-env-data-ap-southeast-2/acsc-ga-2015.parquet
      hash: md5
      etag: 690cc905d526d6f14d1ac3f2fcb3662c-2
      size: 8959806
    - path: s3://csdr-dev-env-data-ap-southeast-2/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 11093f304dc3de4b683615b304275ced.dir
      size: 705037
      nfiles: 52
    params:
      params.yaml:
        zonal_stats:
        - stat: sum
          mode: area
          name: total_area
        - stat: mean
          mode: pixel
          name: percent_cover
    outs:
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: d539bfe9a05472caa82aa940c229ba4f
      size: 22578199
  validate_zonal_stats:
    cmd: 'csdr geometries validate --input-file out/tsg_zonal_stats_acsc.parquet #
      Add --schema if a specific schema exists for validation'
    deps:
    - path: ../../csdr/cli_geometries.py
      hash: md5
      md5: 780de4983800dd5a90e6053cc8d3783a
      size: 4813
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: d539bfe9a05472caa82aa940c229ba4f
      size: 22578199
  upload:
    cmd: if [[ 
      s3://csdr-dev-env-data-ap-southeast-2/tsg_zonal_stats_acsc.parquet == 
      s3://* ]]; then aws s3 cp out/tsg_zonal_stats_acsc.parquet 
      s3://csdr-dev-env-data-ap-southeast-2/tsg_zonal_stats_acsc.parquet; else 
      echo "out_s3_path does not start with s3://, skipping upload" && cp 
      out/tsg_zonal_stats_acsc.parquet 
      s3://csdr-dev-env-data-ap-southeast-2/tsg_zonal_stats_acsc.parquet; fi
    deps:
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: d539bfe9a05472caa82aa940c229ba4f
      size: 22578199
    outs:
    - path: s3://csdr-dev-env-data-ap-southeast-2/tsg_zonal_stats_acsc.parquet
      hash: md5
      etag: 6bd7b4b360da13b0ebe8eee574814252-3
      size: 22578199
