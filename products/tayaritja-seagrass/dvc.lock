schema: '2.0'
stages:
  calculate_zonal_stats:
    cmd: csdr vector-cube zonal-stats --input-zarr /tmp/csdr-dvc-out/nesp36_seagrass_baseline.zarr
      --input-geoparquet /tmp/csdr-dvc-out/acsc-ga-2015.parquet --output-path out/tsg_zonal_stats_acsc.parquet
      --data-variable data_variable --name-dim acsc --fill-value None --proj-crs EPSG:9473
    deps:
    - path: ../../csdr/cli_vector_cube.py
      hash: md5
      md5: 5bdca188f69507fea32ae263e1721d60
      size: 7697
    - path: /tmp/csdr-dvc-out/acsc-ga-2015.parquet
      hash: md5
      md5: b6df59c688f8019eac018b7fb4089d79
      size: 8959806
    - path: /tmp/csdr-dvc-out/nesp36_seagrass_baseline.zarr
      hash: md5
      md5: 896d8117fe5782c098593599a3f99e78.dir
      size: 81802
      nfiles: 20
    params:
      params.yaml:
        zonal_stats:
        - stat: sum
          mode: area
          name: total_area
        - stat: mean
          mode: pixel
          name: percent_cover
    outs:
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: 17bc2662698b753f973fc6679bb1afc4
      size: 18687964
  validate_zonal_stats:
    cmd: 'csdr geometries validate --input-file out/tsg_zonal_stats_acsc.parquet #
      Add --schema if a specific schema exists for validation'
    deps:
    - path: ../../csdr/cli_geometries.py
      hash: md5
      md5: 95cc1509f8c7b0986bf3ecffe744294f
      size: 4989
    - path: out/tsg_zonal_stats_acsc.parquet
      hash: md5
      md5: 17bc2662698b753f973fc6679bb1afc4
      size: 18687964
