name : Build Docker Image

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sustainabledevelopmentreform/csdr-cloud-spatial  # ${{ github.repository }}
  AWS_ROLE_TO_ASSUME: arn:aws:iam::891612567384:role/ecr-csdr-cloud-spatial-role-federated

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - created

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1
        with:
          src: csdr

  build-and-push:
    permissions:
      id-token: write
      packages: write
      contents: read
    runs-on: ubuntu-latest
    needs: ruff
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-region: ap-southeast-2
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Get version number and set latest tag if on main
        id: version
        run: |
          # Get version from the git tags
          git fetch --all --tags
          VERSION=$(git describe --tags)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          # Check if we are on the main branch and set LATEST_TAG accordingly
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "LATEST_TAG=${{ steps.login-ecr.outputs.registry }}/${{ vars.AWS_ECR_REPO }}:latest" >> $GITHUB_OUTPUT
          else
            echo "LATEST_TAG=" >> $GITHUB_OUTPUT
          fi

      # Cache docker stuff
      - uses: docker/setup-qemu-action@v3.6.0
      - uses: docker/setup-buildx-action@v3.10.0

      - name: Build and push
        if: ${{ github.event_name == 'release' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.AWS_ECR_REPO }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.version.outputs.LATEST_TAG }}
