schema: '2.0'
stages:
  download_extract_asgs:
    cmd: "mkdir -p in/asgs-ste-2021\necho \"Downloading from https://www.abs.gov.au/statistics/standards/australian-statistical-geography-standard-asgs-edition-3/jul2021-jun2026/access-and-downloads/digital-boundary-files/STE_2021_AUST_SHP_GDA2020.zip...\"\
      \ncurl -L -o in/asgs-ste-2021/STE_2021_AUST_SHP_GDA2020.zip https://www.abs.gov.au/statistics/standards/australian-statistical-geography-standard-asgs-edition-3/jul2021-jun2026/access-and-downloads/digital-boundary-files/STE_2021_AUST_SHP_GDA2020.zip\n
      echo \"Unzipping...\"\nunzip -o in/asgs-ste-2021/STE_2021_AUST_SHP_GDA2020.zip
      -d in/asgs-ste-2021\n"
    outs:
    - path: in/asgs-ste-2021
      hash: md5
      md5: 08c751eeee0f605a11bf6827f70d7674.dir
      size: 51045181
      nfiles: 6
  convert_asgs:
    cmd: csdr geometries convert-vector --input-dir in/asgs-ste-2021 --input-glob
      STE_2021_AUST_GDA2020.shp --target-crs EPSG:4326 --output-path out/asgs-ste-2021.parquet
      --name-property STE_NAME21
    deps:
    - path: ../../csdr/cli_geometries.py
      hash: md5
      md5: e046408ff0900f26dac7cf33018d318b
      size: 4856
    - path: in/asgs-ste-2021
      hash: md5
      md5: 08c751eeee0f605a11bf6827f70d7674.dir
      size: 51045181
      nfiles: 6
    outs:
    - path: out/asgs-ste-2021.parquet
      hash: md5
      md5: d30b066c8272157d35621f400b5d20fa
      size: 28619293
  validate_asgs:
    cmd: 'csdr geometries validate --input-file out/asgs-ste-2021.parquet # --schema
      ../../../schemas/geoparquet_standard.json # Example schema path'
    deps:
    - path: ../../csdr/cli_geometries.py
      hash: md5
      md5: e046408ff0900f26dac7cf33018d318b
      size: 4856
    - path: out/asgs-ste-2021.parquet
      hash: md5
      md5: d30b066c8272157d35621f400b5d20fa
      size: 28619293
  upload_asgs:
    cmd: if [[ s3://csdr-dvc-out/asgs-ste-2021.parquet == s3://* ]]; then aws s3 cp
      out/asgs-ste-2021.parquet s3://csdr-dvc-out/asgs-ste-2021.parquet; else echo
      "out_s3_path does not start with s3://, skipping upload" && cp out/asgs-ste-2021.parquet
      s3://csdr-dvc-out/asgs-ste-2021.parquet; fi
    deps:
    - path: out/asgs-ste-2021.parquet
      hash: md5
      md5: d30b066c8272157d35621f400b5d20fa
      size: 28619293
    outs:
    - path: s3://csdr-dvc-out/asgs-ste-2021.parquet
      hash: md5
      etag: 3b1f37098f089a5dc970b4674540b305-4
      size: 28619293
