# Pipeline specific to ASGS STE Geometries (Edition 3)

# Internal variables
vars:
  - archive_name: STE_2021_AUST_SHP_GDA2020.zip
  - shapefile_name: STE_2021_AUST_GDA2020.shp
  - extract_dir: in/asgs-ste-2021
  - parquet_output: out/asgs-ste-2021.parquet # Relative to project root

stages:
  download_extract_asgs:
    desc: Download and extract ASGS STE shapefile archive
    cmd: |
      mkdir -p ${extract_dir}
      echo "Downloading from ${url}..." 
      curl -L -o ${extract_dir}/${archive_name} ${url} 
      echo "Unzipping..." 
      unzip -o ${extract_dir}/${archive_name} -d ${extract_dir}
    outs:
      - ${extract_dir}:
          cache: false # Often don't cache raw downloads/extracts if source URL is stable

  convert_asgs:
    desc: Convert extracted shapefile to GeoParquet
    cmd: >-
      csdr geometries convert-vector 
      --input-dir ${extract_dir} 
      --input-glob ${shapefile_name} 
      --target-crs EPSG:4326 
      --output-path ${parquet_output}
    # Depend on the directory from previous stage and the script
    deps:
      - ${extract_dir}

      - ../../csdr/cli_geometries.py
    # Define the output relative to the main project root
    outs:
      - ${parquet_output}:
          cache: false

  validate_asgs:
    desc: Validate the generated GeoParquet file (schema, CRS, etc.)
    cmd: >-
      csdr geometries validate
      --input-file ${parquet_output}
      # --schema ../../../schemas/geoparquet_standard.json # Example schema path
    deps:
      - ${parquet_output} # Depends on the converted file

      - ../../csdr/cli_geometries.py

  # publish_asgs:
  #   desc: Publish the ASGS GeoParquet file to the data store
  #   cmd: >-
  #     csdr publish
  #     --input-file ${parquet_output}
  #     --bucket csdr-data-dev
  #     --bucket-path geometries/abs-asgs-edition-3/asgs-ste-2021.parquet

  upload_asgs:
    cmd: >-
      aws s3 cp ${parquet_output} ${out_s3_path}
    deps:
      - ${parquet_output}
    outs:
      - ${out_s3_path}:
          cache: false
